<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交互式 PRD - 分享文档链接</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#A2D2FF',
            darkbg: '#0f172a',
            darkpanel: '#1e293b'
          }
        }
      }
    }
  </script>
  <!-- Mermaid.js (强制版本 11+) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* 核心重置与基础样式 */
    :root {
      --sidebar-width: 280px;
      --prototype-width: 600px; /* PC端预览区较宽 */
      --header-height: 60px;
    }
    
    body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* 外层防抖 */
      transition: background-color 0.3s, color 0.3s;
    }
    
    body.dark {
      background-color: var(--darkbg);
      color: #e2e8f0;
    }

    /* 隐藏原生滚动条，保持界面纯净 */
    ::-webkit-scrollbar { display: none !important; width: 0 !important; background: transparent !important; }
    * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

    /* 三栏布局容器 */
    .app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* 左侧：TOC 目录 */
    .toc-sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      background: #f8fafc;
      border-right: 1px solid #e2e8f0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      z-index: 40;
    }
    body.dark .toc-sidebar { background: var(--darkpanel); border-right-color: #334155; }
    
    .toc-sidebar.collapsed {
      width: 0;
      border-right: none;
      overflow: hidden;
    }

    .toc-header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-weight: bold;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    body.dark .toc-header { border-bottom-color: #334155; }

    .toc-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
    }

    .toc-item {
      padding: 8px 20px 8px 30px;
      font-size: 14px;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
      display: block;
      text-decoration: none;
    }
    .toc-item.level-2 { padding-left: 20px; font-weight: 600; color: #334155; margin-top: 8px; }
    .toc-item.level-3 { padding-left: 36px; }
    .toc-item.level-4 { padding-left: 52px; font-size: 13px; }
    
    body.dark .toc-item { color: #94a3b8; }
    body.dark .toc-item.level-2 { color: #e2e8f0; }

    .toc-item:hover { background: #f1f5f9; color: #0f172a; }
    body.dark .toc-item:hover { background: #334155; color: #f8fafc; }

    .toc-item.active {
      background: #eff6ff;
      color: #2563eb;
      border-left-color: #2563eb;
    }
    body.dark .toc-item.active {
      background: rgba(37, 99, 235, 0.2);
      color: #60a5fa;
      border-left-color: #60a5fa;
    }

    /* 中间：PRD 正文区 */
    .main-content {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      scroll-behavior: smooth;
      background: #ffffff;
      padding: 40px 60px 100px;
      position: relative;
      min-width: 400px; /* 防止被压缩到无法阅读 */
    }
    body.dark .main-content { background: var(--darkbg); }

    .markdown-body {
      max-width: 800px;
      margin: 0 auto;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.7;
      color: #334155;
    }
    body.dark .markdown-body { color: #cbd5e1; }

    .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #0f172a; margin-top: 2em; margin-bottom: 1em; font-weight: 700; }
    body.dark .markdown-body h1, body.dark .markdown-body h2, body.dark .markdown-body h3 { color: #f8fafc; }
    
    .markdown-body h1 { font-size: 2.25rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.3em; margin-top: 0; }
    .markdown-body h2 { font-size: 1.75rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3em; }
    body.dark .markdown-body h1, body.dark .markdown-body h2 { border-bottom-color: #334155; }
    
    .markdown-body table { width: 100%; border-collapse: collapse; margin: 1.5em 0; font-size: 14px; }
    .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
    .markdown-body th { background: #f8fafc; font-weight: 600; }
    body.dark .markdown-body th, body.dark .markdown-body td { border-color: #334155; }
    body.dark .markdown-body th { background: #1e293b; }
    
    .markdown-body code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: #ef4444; }
    body.dark .markdown-body code { background: #334155; color: #fca5a5; }

    /* 右侧：原型预览区 (PC端固定宽度适配模式) */
    .prototype-panel {
      width: var(--prototype-width);
      height: 100vh;
      background: #f1f5f9;
      border-left: 1px solid #e2e8f0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: width 0.3s ease;
    }
    body.dark .prototype-panel { background: #0f172a; border-left-color: #334155; }

    .prototype-header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
      z-index: 10;
    }
    body.dark .prototype-header { background: var(--darkpanel); border-bottom-color: #334155; }

    .prototype-container {
      flex: 1;
      position: relative;
      overflow: hidden; /* 防止 iframe 撑破 */
      min-width: 0; /* 彻底防撑破 */
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #e2e8f0;
    }
    body.dark .prototype-container { background-color: #0f172a; }

    /* PC 端 iframe 缩放策略 */
    /* 假设设计稿基准宽度为 1440px，当前面板宽度为 600px，缩放比例 = 600/1440 ≈ 0.416 */
    #prototype-iframe {
      width: 1440px;
      /* 高度需反向补偿：100% / 0.416 ≈ 240% */
      height: 240%; 
      border: none;
      transform: scale(0.4166);
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
      background: #ffffff;
      transition: opacity 0.3s ease;
      opacity: 1;
    }

    /* 悬浮控制台 */
    .floating-controls {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
      display: flex;
      gap: 8px;
    }
    .control-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #475569;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      transition: all 0.2s;
    }
    .control-btn:hover { background: #ffffff; color: #0f172a; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    body.dark .control-btn { background: rgba(30, 41, 59, 0.9); border-color: #334155; color: #94a3b8; }
    body.dark .control-btn:hover { background: #1e293b; color: #f8fafc; }

    /* Mermaid 容错隔离 */
    div[id^="dmermaid"] {
      position: absolute !important;
      top: -9999px !important;
      visibility: hidden !important;
    }
    .mermaid-error {
      background: #fef2f2;
      border: 1px solid #f87171;
      color: #991b1b;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      margin: 1em 0;
      overflow-x: auto;
    }
    body.dark .mermaid-error { background: #450a0a; border-color: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>

  <!-- 悬浮控制台 -->
  <div class="floating-controls">
    <button class="control-btn" id="btn-toggle-toc" title="切换目录">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
    <button class="control-btn" id="btn-toggle-theme" title="切换深色模式">
      <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
      <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
    </button>
  </div>

  <div class="app-container">
    <!-- 左侧 TOC -->
    <aside class="toc-sidebar" id="toc-sidebar">
      <div class="toc-header ml-12">文档目录</div>
      <div class="toc-content" id="toc-container">
        <!-- 动态生成 -->
      </div>
    </aside>

    <!-- 中间 正文 -->
    <main class="main-content" id="main-scroll">
      <div class="markdown-body" id="markdown-container">
        <div class="flex justify-center items-center h-64 text-gray-400">正在渲染文档内容...</div>
      </div>
    </main>

    <!-- 右侧 原型预览 -->
    <aside class="prototype-panel">
      <div class="prototype-header">
        <div class="font-bold text-sm text-gray-700 dark:text-gray-300 flex items-center gap-2">
          <i data-lucide="monitor" class="w-4 h-4"></i> 交互原型预览
        </div>
        <div class="text-xs text-gray-500 px-2 py-1 bg-gray-100 dark:bg-slate-700 rounded" id="prototype-status">
          就绪
        </div>
      </div>
      <div class="prototype-container">
        <!-- iframe 初始加载默认原型 -->
        <iframe id="prototype-iframe" src="./Prototypes/index.html" onload="handleIframeLoad(this)"></iframe>
      </div>
    </aside>
  </div>

  <script>
    // 1. 初始化 Icons
    lucide.createIcons();

    // 2. 状态与控制逻辑
    const htmlEl = document.documentElement;
    const bodyEl = document.body;
    const sidebar = document.getElementById('toc-sidebar');
    const iframe = document.getElementById('prototype-iframe');
    const statusBadge = document.getElementById('prototype-status');

    // 切换目录
    document.getElementById('btn-toggle-toc').addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    // 切换主题
    document.getElementById('btn-toggle-theme').addEventListener('click', () => {
      htmlEl.classList.toggle('dark');
      bodyEl.classList.toggle('dark');
      
      // 同步深色模式给 iframe 兜底
      try {
        const isDark = bodyEl.classList.contains('dark');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        if (iframeDoc && iframeDoc.body) {
          iframeDoc.body.style.backgroundColor = isDark ? '#0f172a' : '#ffffff';
        }
      } catch(e) {}
    });

    // 3. 核心：解析 Markdown 与渲染图表
    // 这里将原始 PRD 的文本硬编码进来，避免前端 fetch 读取本地文件的跨域报错
    const prdRawMarkdown = `
# 产品需求文档 (PRD)

## 1. 文档概述 (Document Overview)

### 1.1 文档信息
* **需求名称**：分享文档链接 (Share Document Link)
* **所属迭代**：2604_2
* **文档状态**：已定稿

## 2. 需求背景与目标 (Background & Objectives)

### 2.1 当前痛点
目前系统只能分享根域名。团队成员在沟通时需要精确指向某个特定文档，接收方必须自己在庞大的左侧文件树中逐层寻找，沟通成本极高且容易找错。

### 2.2 业务目标
实现深度链接（Deep Linking）与便捷分享机制。
1. 使系统的 URL 能够实时反映当前阅读的仓库和文件路径。
2. 提供显式的分享入口，一键复制。
3. 接收者点击链接后“开箱即用”，系统自动定位、展开树节点并渲染目标内容。

## 3. 名词字典 (Glossary)

| 名词 | 定义说明 | 备注 |
| :--- | :--- | :--- |
| **系统分享链接** | 包含当前系统域名、路由及特定查询参数（repo 和 file）的 URL。 | 示例：?repo=PRD-Reader&file=docs/readme.md |
| **下钻模式 (Drill-down)** | 一种特殊的左侧文件树渲染状态。以分享链接指定的文件夹作为唯一根节点进行渲染。 | 提升特定文档阅读时的专注度。 |
| **原位拦截 (In-place Interception)** | 当分享链接失效或无权限时，不触发全局路由跳转，在主阅读区直接渲染 404。 | 保证侧边栏稳定。 |

## 4. 核心业务流程 (Business Flow)
核心分为分享者和接收者两条链路：
1. **分享者**：悬停树节点 -> 点击分享 Icon -> 弹出选项菜单 -> 选择复制系统链接 -> 剪贴板写入并 Toast 提示。
2. **接收者**：点击链接 -> 系统解析参数 -> 校验权限与存在性 -> (异常渲染 404) -> (正常触发下钻并高亮) -> 右侧拉取渲染。

## 5. 数据流与状态流转 (Data & State Flow)

### 5.1 实体关系说明 (ER Diagram)
本次迭代主要是前端状态机与 URL 的映射。

\`\`\`mermaid
erDiagram
    URL_PARAMS {
        string repo "仓库ID/名称"
        string file "相对路径"
    }
    READER_STORE {
        object currentFile "当前阅读的文件"
        object drillDownRoot "当前下钻的根节点"
        array treeData "当前展示的树结构"
    }
    
    URL_PARAMS ||--o| READER_STORE : "触发(初始化时)"
    READER_STORE ||--o| URL_PARAMS : "同步(状态变化时)"
\`\`\`

## 6. 功能模块与页面细节 (Features & UI Details)

### 6.1 全局：URL 状态同步器
- **规则**：隐形逻辑，负责维持 URL 地址栏与当前阅读状态的一致性。任何合法树节点点击，必须静默更新 URL。

### 6.2 左侧树：悬浮操作区与气泡菜单 (Popover)
- **规则**：挂载在左侧 TreeNode 组件上的交互元素。
- **展示元素定义**：
  - 分享 Icon：Hover 状态触发显示。
  - 气泡菜单 (Popover)：点击分享 Icon 触发，包含复制 Git 地址和系统链接。
- **交互联动**：点击目录的此章节，右侧原型演示**打开气泡菜单**的状态。

### 6.3 左侧树：下钻模式 (Drill-down View)
- **规则**：接收者通过链接进入系统时，左侧树的特殊渲染形态。隐藏全局仓库列表，仅展示目标文件夹及其子层级。
- **交互联动**：点击目录的此章节，右侧原型演示**下钻模式（仅显示 Docs 文件夹）**。

### 6.4 主阅读区：404 缺省状态页
- **规则**：用于原位拦截并展示因分享链接失效导致的错误信息。
- **交互联动**：点击目录的此章节，右侧原型演示**仓库无权限**的 404 缺省状态。

## 7. 非功能性需求 (NFR)
1. **性能**：URL 状态同步不应引发整个 React 根组件树的重渲染。
2. **兼容性**：Clipboard API 需兼容主流现代浏览器。
`;

    // Mermaid 容错初始化
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      securityLevel: 'loose',
      htmlLabels: true,
      er: { useMaxWidth: false }
    });

    // 实体解码函数（第一重防御）
    function decodeHTMLEntities(text) {
      const textArea = document.createElement('textarea');
      textArea.innerHTML = text;
      let decoded = textArea.value;
      // 硬补丁：修复 ER 图关系符
      decoded = decoded.split('||--o{').join(' ||--o{ ').split('||--o|').join(' ||--o| ');
      return decoded.replace(/\\u200B/g, '');
    }

    async function renderContent() {
      const container = document.getElementById('markdown-container');
      
      // 使用 marked 解析 Markdown
      container.innerHTML = marked.parse(prdRawMarkdown);
      
      // 提取并渲染所有 Mermaid 图表
      const mermaidBlocks = container.querySelectorAll('code.language-mermaid');
      
      // 强制串行渲染（第三重防御）
      for (let i = 0; i < mermaidBlocks.length; i++) {
        const block = mermaidBlocks[i];
        const pre = block.parentElement;
        const rawCode = decodeHTMLEntities(block.innerHTML);
        const id = 'mermaid-' + Date.now() + '-' + i;
        
        try {
          const { svg } = await mermaid.render(id, rawCode);
          const div = document.createElement('div');
          div.className = 'flex justify-center my-8';
          div.innerHTML = svg;
          pre.replaceWith(div);
        } catch (e) {
          console.error("Mermaid Render Error:", e);
          const errDiv = document.createElement('div');
          errDiv.className = 'mermaid-error';
          errDiv.innerHTML = `<strong>图表渲染失败:</strong><br/>${e.message}<br/><pre class="mt-2 text-xs">${rawCode}</pre>`;
          pre.replaceWith(errDiv);
        } finally {
          // 精准清理幽灵节点（第四重防御）
          const ghostNode = document.getElementById('d' + id);
          if (ghostNode) ghostNode.remove();
        }
      }
      
      // 构建 TOC 和路由映射
      buildTOCAndRouting();
    }

    // 4. 构建 TOC 与深度路由映射表
    // 映射表：目录标题前缀 -> 原型页面内的动作/Hash
    const routingMap = {
      '6.2': { action: 'simulatePopover' },
      '6.3': { action: 'simulateDrillDown' },
      '6.4': { action: 'simulate404' }
    };

    const tocLinks = [];

    function buildTOCAndRouting() {
      const container = document.getElementById('markdown-container');
      const tocContainer = document.getElementById('toc-container');
      const headings = container.querySelectorAll('h2, h3, h4');
      
      tocContainer.innerHTML = '';
      
      headings.forEach((heading, index) => {
        // 生成锚点 ID
        const id = 'heading-' + index;
        heading.id = id;
        
        const level = parseInt(heading.tagName.substring(1));
        const text = heading.innerText;
        
        const link = document.createElement('a');
        link.href = '#' + id;
        link.className = `toc-item level-${level}`;
        link.innerText = text;
        link.setAttribute('data-target', id);
        
        // 查找路由匹配
        const prefixMatch = Object.keys(routingMap).find(prefix => text.startsWith(prefix));
        if (prefixMatch) {
          link.setAttribute('data-action', routingMap[prefixMatch].action);
        }
        
        link.addEventListener('click', (e) => {
          e.preventDefault();
          
          // 平滑滚动正文
          heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
          
          // 更新高亮
          document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
          link.classList.add('active');
          
          // 触发联动 iframe
          const action = link.getAttribute('data-action');
          if (action) triggerIframeAction(action);
        });
        
        tocContainer.appendChild(link);
        tocLinks.push(link);
      });
      
      // 启动滚动侦听
      initScrollSpy();
    }

    // 5. 极其稳健的滚动侦听 (基于 getBoundingClientRect)
    function initScrollSpy() {
      const mainScroll = document.getElementById('main-scroll');
      const headings = Array.from(document.getElementById('markdown-container').querySelectorAll('h2, h3, h4'));
      let scrollDebounceTimer;

      mainScroll.addEventListener('scroll', () => {
        let currentId = '';
        const mainRect = mainScroll.getBoundingClientRect();

        // 逆向遍历，寻找处于视口顶部的章节
        for (let i = headings.length - 1; i >= 0; i--) {
          const heading = headings[i];
          const rect = heading.getBoundingClientRect();
          // 视觉缓冲 100px
          if (rect.top <= mainRect.top + 100) {
            currentId = heading.id;
            break;
          }
        }

        if (!currentId && headings.length > 0) currentId = headings[0].id;

        tocLinks.forEach(link => {
          link.classList.remove('active');
          if (link.getAttribute('data-target') === currentId) {
            link.classList.add('active');
            
            // 联动 iframe 防抖
            clearTimeout(scrollDebounceTimer);
            scrollDebounceTimer = setTimeout(() => {
              const action = link.getAttribute('data-action');
              if (action) triggerIframeAction(action);
            }, 300); // 停止滚动 300ms 后才触发
          }
        });
      });
    }

    // 6. Iframe 联动控制 (跨文档通讯)
    function triggerIframeAction(actionName) {
      statusBadge.innerText = '同步中...';
      statusBadge.classList.replace('bg-gray-100', 'bg-blue-100');
      statusBadge.classList.replace('text-gray-500', 'text-blue-600');
      
      try {
        const iframeWin = iframe.contentWindow;
        
        // 调用原型内部预埋的全局函数进行演示
        if (actionName === 'simulatePopover' && iframeWin.openPopover) {
          // 找到 docs 节点模拟点击
          const btn = iframeWin.document.querySelector('#repo1 .action-btn');
          if (btn) iframeWin.openPopover(new Event('click'), 'popover-docs', btn);
        } 
        else if (actionName === 'simulateDrillDown' && iframeWin.drillDown) {
          iframeWin.drillDown(new Event('click'), 'docs', '文件夹');
        }
        else if (actionName === 'simulate404' && iframeWin.simulate404) {
          iframeWin.simulate404('repo');
        }
        
        setTimeout(() => {
          statusBadge.innerText = '就绪';
          statusBadge.classList.replace('bg-blue-100', 'bg-gray-100');
          statusBadge.classList.replace('text-blue-600', 'text-gray-500');
        }, 500);
        
      } catch(e) {
        console.warn("Iframe 联动失败，可能因跨域或未完全加载:", e);
      }
    }

    // iframe 加载完成后的跨文档注入
    function handleIframeLoad(iframeEl) {
      try {
        const iframeDoc = iframeEl.contentDocument || iframeEl.contentWindow.document;
        
        // 注入隐藏滚动条的样式
        const style = iframeDoc.createElement('style');
        style.textContent = `
          body::-webkit-scrollbar, html::-webkit-scrollbar, *::-webkit-scrollbar {
              display: none !important; width: 0 !important; background: transparent !important;
          }
          body, html, * {
              -ms-overflow-style: none !important; scrollbar-width: none !important;
          }
        `;
        iframeDoc.head.appendChild(style);
        
        // 兜底深色模式
        const isDark = document.body.classList.contains('dark');
        if (isDark) iframeDoc.body.style.backgroundColor = '#0f172a';
        
      } catch(e) {
        // 跨域时静默失败
      }
    }

    // 启动渲染
    renderContent();

  </script>
</body>
</html>
