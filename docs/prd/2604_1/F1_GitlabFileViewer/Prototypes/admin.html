<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Soft Playful</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-pastel: #FDF4F5;
            --sidebar-bg: #E8F3F1;
            --accent-pink: #FFB5C2;
            --accent-blue: #A2D2FF;
            --accent-yellow: #FDE293;
            --text-dark: #4A4E69;
            --text-light: #9CA3AF;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-pastel);
            color: var(--text-dark);
            overflow: hidden;
        }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; width: 0; background: transparent; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        .pill-shape { border-radius: 9999px; }
        .soft-shadow { box-shadow: 0 10px 25px -5px rgba(162, 210, 255, 0.3); }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.05); }
        
        /* 表单控件样式 */
        .soft-input {
            background: #F9FAFB;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 10px 16px;
            color: #4A4E69;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
        }
        .soft-input:focus {
            outline: none;
            background: #FFFFFF;
            border-color: var(--accent-blue);
            box-shadow: 0 4px 15px rgba(162, 210, 255, 0.2);
        }
        
        .soft-btn {
            background: var(--accent-blue);
            color: white;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 16px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .soft-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(162, 210, 255, 0.4);
        }
        .soft-btn-outline {
            background: white;
            color: #4A4E69;
            border: 2px solid #E5E7EB;
        }
        .soft-btn-outline:hover {
            border-color: #D1D5DB;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body class="flex h-screen w-screen p-3 gap-3">

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col relative bg-white rounded-[32px] card-shadow overflow-hidden border-4 border-[var(--bg-pastel)]">
        
        <!-- 顶部导航条 -->
        <header class="h-20 flex items-center justify-between px-10 border-b border-gray-50 bg-white sticky top-0 z-20">
            <div class="flex items-center gap-4">
                <a href="index.html" class="w-10 h-10 rounded-full bg-[#F3F4F6] flex items-center justify-center text-[#9CA3AF] hover:bg-[var(--accent-blue)] hover:text-white transition-all">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
                <div class="font-['Quicksand'] font-bold text-xl text-[#4A4E69]">后台配置</div>
            </div>
        </header>

        <!-- 设置区域 -->
        <div class="flex-1 overflow-y-auto p-12">
            <div class="max-w-4xl mx-auto space-y-10">
                
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-[var(--accent-yellow)] rounded-[20px] flex items-center justify-center mx-auto mb-4 transform rotate-12 shadow-sm">
                        <i data-lucide="settings-2" class="w-8 h-8 text-white"></i>
                    </div>
                    <h1 class="font-['Quicksand'] text-3xl font-bold text-[#4A4E69] mb-2">系统配置中心</h1>
                    <p class="text-[#9CA3AF] font-semibold">管理您的 GitLab 连接和可见仓库白名单。</p>
                </div>

                <!-- 模块 1: 全局 Token 配置 -->
                <section class="bg-white border-2 border-[#F3F4F6] rounded-[24px] overflow-hidden hover:border-[var(--accent-blue)] transition-colors duration-300">
                    <div class="px-8 py-6 border-b-2 border-[#F3F4F6] bg-[#F9FAFB] flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm">
                                <i data-lucide="key" class="w-6 h-6 text-[var(--accent-pink)]"></i>
                            </div>
                            <div>
                                <h2 class="font-['Quicksand'] text-xl font-bold text-[#4A4E69]">GitLab 访问令牌</h2>
                                <p class="text-sm text-[#9CA3AF] mt-1 font-semibold">用于全局拉取仓库文件。需要 <code class="bg-gray-100 px-1 py-0.5 rounded text-pink-600 font-mono">read_api</code> 权限。</p>
                            </div>
                        </div>
                        <div class="bg-white px-4 py-2 rounded-full shadow-sm flex items-center gap-2 text-sm font-bold text-[#10B981] border border-[#10B981]/20">
                            <div class="w-2 h-2 rounded-full bg-[#10B981] animate-pulse"></div>
                            已连接
                        </div>
                    </div>
                    
                    <div class="p-8 space-y-6">
                        <div>
                            <label class="block text-sm font-bold text-[#6B7280] mb-2 pl-2">GitLab 实例地址</label>
                            <input type="text" value="https://gitlab.com" class="soft-input">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-[#6B7280] mb-2 pl-2">个人/项目访问令牌 (Token)</label>
                            <div class="relative">
                                <input type="password" value="glpat-xxxxxxxxxxxxxxxxxxxx" class="soft-input font-mono">
                                <button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#9CA3AF] hover:text-[var(--accent-blue)] transition-colors">
                                    <i data-lucide="eye" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-end gap-4 pt-4">
                            <button class="soft-btn soft-btn-outline">
                                测试连接
                            </button>
                            <button class="soft-btn">
                                <i data-lucide="save" class="w-4 h-4"></i>
                                保存配置
                            </button>
                        </div>
                    </div>
                </section>

                <!-- 模块 2: 可见仓库白名单 -->
                <section class="bg-white border-2 border-[#F3F4F6] rounded-[24px] overflow-hidden hover:border-[var(--accent-blue)] transition-colors duration-300">
                    <div class="px-8 py-6 border-b-2 border-[#F3F4F6] bg-[#F9FAFB] flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm">
                                <i data-lucide="shield-check" class="w-6 h-6 text-[var(--accent-blue)]"></i>
                            </div>
                            <div>
                                <h2 class="font-['Quicksand'] text-xl font-bold text-[#4A4E69]">仓库白名单</h2>
                                <p class="text-sm text-[#9CA3AF] mt-1 font-semibold">只有添加到这里的仓库才会展示给前端用户。</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-8">
                        <div class="flex items-end gap-4 mb-8">
                            <div class="flex-1">
                                <label class="block text-sm font-bold text-[#6B7280] mb-2 pl-2">添加仓库 (ID 或 路径)</label>
                                <input type="text" placeholder="例如: 12345 或 group/project" class="soft-input">
                            </div>
                            <button class="soft-btn h-[44px]">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                                添加仓库
                            </button>
                        </div>

                        <div class="space-y-3">
                            <!-- 列表项 1 -->
                            <div class="bg-[#F9FAFB] border-2 border-transparent hover:border-[#E5E7EB] rounded-[20px] p-4 flex items-center justify-between transition-colors group">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-2xl bg-white shadow-sm flex items-center justify-center text-[#9CA3AF] font-bold">FC</div>
                                    <div>
                                        <div class="font-bold text-[#4A4E69]">前端核心</div>
                                        <div class="text-xs text-[#9CA3AF] font-mono mt-0.5">company/frontend-core</div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="bg-[#10B981]/10 text-[#10B981] px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                                        <i data-lucide="check" class="w-3 h-3"></i> 正常
                                    </span>
                                    <button class="w-8 h-8 rounded-full flex items-center justify-center text-[#9CA3AF] hover:bg-[#FEE2E2] hover:text-[#EF4444] transition-colors opacity-0 group-hover:opacity-100">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <!-- 列表项 2 -->
                            <div class="bg-[#F9FAFB] border-2 border-transparent hover:border-[#E5E7EB] rounded-[20px] p-4 flex items-center justify-between transition-colors group">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-2xl bg-white shadow-sm flex items-center justify-center text-[#9CA3AF] font-bold">BS</div>
                                    <div>
                                        <div class="font-bold text-[#4A4E69]">后端服务</div>
                                        <div class="text-xs text-[#9CA3AF] font-mono mt-0.5">company/backend-services</div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="bg-[#10B981]/10 text-[#10B981] px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                                        <i data-lucide="check" class="w-3 h-3"></i> 正常
                                    </span>
                                    <button class="w-8 h-8 rounded-full flex items-center justify-center text-[#9CA3AF] hover:bg-[#FEE2E2] hover:text-[#EF4444] transition-colors opacity-0 group-hover:opacity-100">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
