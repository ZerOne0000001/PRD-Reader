<!DOCTYPE html>
<html lang="zh-CN" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRD V2 - Editorial Style | GitHub Integration</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        ink: {
                            900: '#0a0a0a',
                            800: '#171717',
                            700: '#262626',
                            500: '#737373',
                            300: '#d4d4d4',
                            100: '#f5f5f5',
                            50: '#fafafa',
                        },
                        paper: {
                            DEFAULT: '#fcfcfc',
                            dark: '#121212',
                        },
                        accent: {
                            DEFAULT: '#e11d48', // 经典编辑红
                            dark: '#fb7185',
                        }
                    },
                    boxShadow: {
                        'editorial': '20px 20px 60px rgba(0,0,0,0.05), -20px -20px 60px rgba(255,255,255,0.8)',
                        'editorial-dark': '20px 20px 60px rgba(0,0,0,0.4), -20px -20px 60px rgba(255,255,255,0.02)',
                    }
                }
            }
        }
    </script>
    
    <!-- Libs -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* Base */
        body {
            background-color: theme('colors.paper.DEFAULT');
            color: theme('colors.ink.900');
            overflow: hidden;
            transition: background-color 0.5s ease;
        }
        body.dark {
            background-color: theme('colors.paper.dark');
            color: theme('colors.ink.100');
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: theme('colors.ink.300'); }
        .dark ::-webkit-scrollbar-thumb { background: theme('colors.ink.700'); }

        /* Editorial Typography & Prose */
        .prose {
            max-width: 65ch;
            font-size: 0.95rem; /* 减小正文基础字号 */
            line-height: 1.8;   /* 稍微增加行高，提升中文阅读体验 */
        }
        
        .prose h1 {
            font-family: theme('fontFamily.serif');
            font-size: 2.5rem;  /* 从 3.5rem 减小到 2.5rem */
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 2rem;
            letter-spacing: 0.02em;
            color: theme('colors.ink.900');
            position: relative;
        }
        .prose h1::after {
            content: '';
            display: block;
            width: 40px;       /* 减小装饰线宽度 */
            height: 3px;       /* 减小装饰线厚度 */
            background-color: theme('colors.accent.DEFAULT');
            margin-top: 1rem;
        }
        
        .prose h2 {
            font-family: theme('fontFamily.sans');
            font-size: 1.25rem; /* 从 1.8rem 减小到 1.25rem */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 3.5rem;
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid theme('colors.ink.900');
            color: theme('colors.ink.900');
        }
        
        .prose h3 {
            font-family: theme('fontFamily.serif');
            font-size: 1.15rem; /* 从 1.5rem 减小到 1.15rem */
            font-weight: 600;
            font-style: normal; /* 去掉斜体，中文斜体效果通常不好 */
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: theme('colors.ink.800');
        }
        
        .prose p { margin-bottom: 1.25rem; }
        
        .prose blockquote {
            font-family: theme('fontFamily.serif');
            font-size: 1.05rem; /* 从 1.25rem 减小到 1.05rem */
            font-style: normal; /* 去掉斜体 */
            border-left: 4px solid theme('colors.accent.DEFAULT');
            padding-left: 1.25rem;
            margin: 1.5rem 0;
            color: theme('colors.ink.500');
        }
        
        .prose table {
            width: 100%;
            margin: 2.5rem 0;
            border-collapse: collapse; /* 改为 collapse 使得内部线条可以生效 */
            border-top: 2px solid theme('colors.ink.900');
            border-bottom: 2px solid theme('colors.ink.900');
            border-left: 1px solid theme('colors.ink.300'); /* 添加左右边框 */
            border-right: 1px solid theme('colors.ink.300');
        }
        .prose th {
            font-family: theme('fontFamily.sans');
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            text-align: left;
            padding: 1rem 0.75rem;
            border-bottom: 2px solid theme('colors.ink.900'); /* 加粗表头底边 */
            border-right: 1px solid theme('colors.ink.300'); /* 添加内部竖线 */
            color: theme('colors.ink.900'); /* 加深表头颜色 */
            background: theme('colors.ink.50'); /* 增加浅色背景区分 */
        }
        .prose td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid theme('colors.ink.300'); /* 加深内部横线 */
            border-right: 1px solid theme('colors.ink.300'); /* 添加内部竖线 */
            font-size: 0.95rem;
        }
        .prose th:last-child, .prose td:last-child {
            border-right: none; /* 去除最右侧竖线，因为表格已经有外边框 */
        }
        .prose tr:last-child td { border-bottom: none; }
        
        .prose code {
            font-family: theme('fontFamily.mono');
            font-size: 0.85em;
            background: theme('colors.ink.50');
            padding: 0.2em 0.4em;
            border: 1px solid theme('colors.ink.100');
            color: theme('colors.accent.DEFAULT');
        }
        .prose pre {
            background: theme('colors.ink.900');
            color: theme('colors.ink.100');
            padding: 1.5rem;
            overflow-x: auto;
            margin: 2rem 0;
        }
        .prose pre code { background: transparent; border: none; color: inherit; }

        /* Dark Mode Prose Adjustments */
        .dark .prose h1, .dark .prose h2 { color: theme('colors.ink.100'); border-color: theme('colors.ink.100'); }
        .dark .prose h1::after { background-color: theme('colors.accent.dark'); }
        .dark .prose h3 { color: theme('colors.ink.300'); }
        .dark .prose blockquote { color: theme('colors.ink.300'); border-color: theme('colors.accent.dark'); }
        .dark .prose table { border-color: theme('colors.ink.100'); }
        .dark .prose th { border-color: theme('colors.ink.700'); border-bottom-color: theme('colors.ink.100'); color: theme('colors.ink.100'); background: theme('colors.ink.800'); }
        .dark .prose td { border-color: theme('colors.ink.700'); }
        .dark .prose code { background: theme('colors.ink.800'); border-color: theme('colors.ink.700'); color: theme('colors.accent.dark'); }

        /* Navigation (TOC) */
        .toc-item {
            display: block;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            color: theme('colors.ink.500');
            border-left: 1px solid theme('colors.ink.100');
            transition: all 0.3s ease;
            position: relative;
        }
        .dark .toc-item { border-left-color: theme('colors.ink.800'); }
        
        .toc-item:hover {
            color: theme('colors.ink.900');
            border-left-color: theme('colors.ink.300');
        }
        .dark .toc-item:hover { color: theme('colors.ink.100'); border-left-color: theme('colors.ink.500'); }
        
        .toc-item.active {
            color: theme('colors.ink.900');
            font-weight: 600;
            border-left-color: theme('colors.accent.DEFAULT');
        }
        .dark .toc-item.active {
            color: theme('colors.ink.100');
            border-left-color: theme('colors.accent.dark');
        }
        
        .toc-item.level-1 { font-family: theme('fontFamily.sans'); font-weight: 600; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1rem; color: theme('colors.ink.900'); }
        .dark .toc-item.level-1 { color: theme('colors.ink.100'); }
        .toc-item.level-2 { padding-left: 1.5rem; }
        .toc-item.level-3 { padding-left: 2.5rem; font-size: 0.8rem; font-family: theme('fontFamily.serif'); font-style: italic; }

        /* Controls */
        .ctrl-btn {
            width: 48px;
            height: 48px;
            background: theme('colors.paper.DEFAULT');
            color: theme('colors.ink.900');
            border: 2px solid theme('colors.ink.900');
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 50%; /* 改为纯圆图标按钮 */
            box-shadow: 4px 4px 0px theme('colors.ink.900'); /* 粗野主义阴影 */
        }
        .ctrl-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px theme('colors.ink.900');
            background: theme('colors.ink.50');
        }
        .ctrl-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px theme('colors.ink.900');
        }
        
        .dark .ctrl-btn {
            background: theme('colors.paper.dark');
            border-color: theme('colors.ink.100');
            color: theme('colors.ink.100');
            box-shadow: 4px 4px 0px theme('colors.ink.100');
        }
        .dark .ctrl-btn:hover {
            box-shadow: 2px 2px 0px theme('colors.ink.100');
            background: theme('colors.ink.900');
        }
        .dark .ctrl-btn:active {
            box-shadow: 0px 0px 0px theme('colors.ink.100');
        }

        /* Mermaid Overrides */
        div[id^="dmermaid"] { position: absolute !important; top: -9999px !important; visibility: hidden !important; }
        .mermaid-container {
            margin: 3rem 0;
            padding: 2rem;
            background: theme('colors.ink.50');
            border: 1px solid theme('colors.ink.100');
            display: flex;
            justify-content: center;
        }
        .dark .mermaid-container { background: theme('colors.ink.900'); border-color: theme('colors.ink.800'); }
        .mermaid svg { max-width: 100% !important; height: auto !important; }

        /* Iframe Container */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: theme('colors.ink.100');
            border-left: 1px solid theme('colors.ink.900');
        }
        .dark .iframe-wrapper {
            background: theme('colors.ink.900');
            border-left-color: theme('colors.ink.100');
        }
        
        .iframe-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: theme('colors.ink.900');
            color: theme('colors.paper.DEFAULT');
            display: flex;
            align-items: center;
            padding: 0 1rem;
            font-family: theme('fontFamily.mono');
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 10;
        }
        .dark .iframe-header { background: theme('colors.ink.100'); color: theme('colors.paper.dark'); }

        #prototype-iframe {
            position: absolute;
            top: 40px;
            left: 0;
            width: 1280px; /* Base Design Width */
            height: calc(100% * (1280 / 800)); /* Will be recalculated in JS */
            transform-origin: top left;
            border: none;
            background: #fff;
            transition: opacity 0.3s ease;
        }
        
        /* Loading */
        #loader {
            position: fixed;
            inset: 0;
            background: theme('colors.paper.DEFAULT');
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .dark #loader { background: theme('colors.paper.dark'); }
        .loader-text {
            font-family: theme('fontFamily.serif');
            font-size: 2rem;
            font-style: italic;
            color: theme('colors.ink.900');
            margin-top: 1rem;
            letter-spacing: 0.05em;
        }
        .dark .loader-text { color: theme('colors.ink.100'); }
        .loader-bar {
            width: 200px;
            height: 1px;
            background: theme('colors.ink.300');
            position: relative;
            overflow: hidden;
        }
        .dark .loader-bar { background: theme('colors.ink.700'); }
        .loader-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: theme('colors.ink.900');
            width: 0%;
            animation: progress 2s ease-in-out infinite;
        }
        .dark .loader-progress { background: theme('colors.ink.100'); }
        @keyframes progress {
            0% { left: -50%; width: 50%; }
            100% { left: 100%; width: 50%; }
        }

    </style>
</head>
<body class="flex flex-row h-screen">

    <!-- Loader -->
    <div id="loader">
        <div class="loader-bar"><div class="loader-progress"></div></div>
        <div class="loader-text">Loading Document...</div>
    </div>

    <!-- Floating Controls -->
    <div class="fixed top-8 left-8 z-50 flex flex-col gap-4">
        <button id="btn-toc" class="ctrl-btn" title="Toggle Navigation">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <button id="btn-theme" class="ctrl-btn" title="Toggle Theme">
            <svg id="icon-sun" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </div>

    <!-- Column 1: Navigation -->
    <aside id="nav-col" class="w-80 flex-shrink-0 flex flex-col h-full pt-32 pb-12 px-8 overflow-y-auto transition-all duration-500 ease-in-out border-r border-ink-100 dark:border-ink-800">
        <div class="font-mono text-xs uppercase tracking-widest text-ink-500 mb-8 border-b border-ink-900 dark:border-ink-100 pb-2">Index</div>
        <nav id="toc-container" class="space-y-1">
            <!-- Injected via JS -->
        </nav>
    </aside>

    <!-- Column 2: Document Content -->
    <main id="content-col" class="flex-1 h-full overflow-y-auto scroll-smooth min-w-0 px-12 lg:px-24 pt-32 pb-32">
        <article class="prose" id="prd-content">
            <!-- Injected via JS -->
        </article>
    </main>

    <!-- Column 3: Prototype -->
    <aside id="proto-col" class="w-[800px] flex-shrink-0 h-full min-w-0 transition-all duration-500">
        <div class="iframe-wrapper" id="iframe-wrapper">
            <div class="iframe-header">
                <span>Interactive Prototype // Admin_v1</span>
            </div>
            <!-- The iframe height and scale will be managed by JS -->
            <iframe id="prototype-iframe" src="./Prototypes/admin.html"></iframe>
        </div>
    </aside>

    <script>
        // === Configuration ===
        const PRD_FILE = './PRD_GitHubIntegration_2604_1.md';
        const PROTO_BASE = './Prototypes/admin.html';
        const PROTO_WIDTH = 1280; // Baseline design width
        
        // === State ===
        let isDark = false;
        let isNavOpen = true;
        let scrollTimer = null;
        let iframeTimer = null;

        // === DOM ===
        const els = {
            loader: document.getElementById('loader'),
            content: document.getElementById('prd-content'),
            toc: document.getElementById('toc-container'),
            mainScroll: document.getElementById('content-col'),
            iframe: document.getElementById('prototype-iframe'),
            iframeWrapper: document.getElementById('iframe-wrapper'),
            navCol: document.getElementById('nav-col'),
            btnToc: document.getElementById('btn-toc'),
            btnTheme: document.getElementById('btn-theme'),
            iconSun: document.getElementById('icon-sun'),
            iconMoon: document.getElementById('icon-moon')
        };

        // === 1. Iframe Resizing Logic (Anti-Blowout) ===
        function resizeIframe() {
            const wrapperWidth = els.iframeWrapper.clientWidth;
            const scale = wrapperWidth / PROTO_WIDTH;
            
            els.iframe.style.width = `${PROTO_WIDTH}px`;
            els.iframe.style.transform = `scale(${scale})`;
            
            // Critical: Calculate reverse height compensation
            const wrapperHeight = els.iframeWrapper.clientHeight - 40; // minus header
            const requiredIframeHeight = wrapperHeight / scale;
            els.iframe.style.height = `${requiredIframeHeight}px`;
        }
        window.addEventListener('resize', resizeIframe);

        // === 2. Markdown & Mermaid Parsing ===
        async function init() {
            try {
                const res = await fetch(PRD_FILE);
                const text = await res.text();
                
                marked.setOptions({ gfm: true, breaks: true });
                
                // Extract Mermaid
                const mermaidBlocks = [];
                let processedText = text.replace(/```mermaid\n([\s\S]*?)```/g, (match, code) => {
                    const idx = mermaidBlocks.length;
                    mermaidBlocks.push(code);
                    return `__MERMAID_${idx}__`;
                });

                let html = await marked.parse(processedText);

                // Restore Mermaid
                mermaidBlocks.forEach((code, i) => {
                    const encoded = code
                        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                    html = html.replace(`__MERMAID_${i}__`, `<div class="mermaid-target" data-code="${encoded}"></div>`);
                });

                els.content.innerHTML = html;
                
                buildTOC();
                setupTheme();
                
                mermaid.initialize({
                    startOnLoad: false,
                    theme: isDark ? 'dark' : 'base',
                    securityLevel: 'loose',
                    htmlLabels: true
                });

                await renderMermaid();
                
                resizeIframe();
                
                // Hide loader
                els.loader.style.opacity = '0';
                setTimeout(() => els.loader.style.display = 'none', 500);

            } catch (e) {
                console.error("Initialization failed:", e);
                els.loader.innerHTML = `<div class="text-accent font-mono">Error loading document.</div>`;
            }
        }

        async function renderMermaid() {
            const targets = document.querySelectorAll('.mermaid-target');
            for (let i = 0; i < targets.length; i++) {
                const target = targets[i];
                let code = target.getAttribute('data-code')
                    .replace(/&gt;/g, '>').replace(/&lt;/g, '<')
                    .replace(/&amp;/g, '&').replace(/&quot;/g, '"')
                    .replace(/&#39;/g, "'").replace(/&#x60;/g, '`')
                    .replace(/\u200B/g, '');

                if (code.includes('erDiagram')) {
                    code = code.replace(/\|\|--o\{/g, ' ||--o{ ')
                               .replace(/\|\|--\|\|/g, ' ||--|| ')
                               .replace(/\|\|--o\|/g, ' ||--o| ');
                }
                if (code.includes('flowchart')) {
                    code = code.replace(/<br\s*\/?>/gi, '<br/>');
                }

                try {
                    const id = `mmd-${Date.now()}-${i}`;
                    const { svg } = await mermaid.render(id, code);
                    target.innerHTML = `<div class="mermaid-container">${svg}</div>`;
                } catch (err) {
                    console.warn('Mermaid Error:', err);
                    target.innerHTML = `<div class="p-4 border border-accent text-accent font-mono text-xs overflow-auto">Render Error: ${err.message}</div>`;
                }
            }
        }

        // === 3. TOC & Scroll Spy ===
        function buildTOC() {
            const headings = els.content.querySelectorAll('h1, h2, h3');
            let tocHTML = '';
            
            headings.forEach((h, i) => {
                const id = `sec-${i}`;
                h.id = id;
                const level = h.tagName.charAt(1);
                
                // Extract numbering for styling
                const match = h.innerText.match(/^(\d+(\.\d+)*)\s+/);
                let text = h.innerText;
                let num = '';
                if (match) {
                    num = `<span class="font-mono text-xs opacity-50 mr-2">${match[1]}</span>`;
                    text = text.replace(match[0], '');
                }

                tocHTML += `<a href="#${id}" class="toc-item level-${level}" data-target="${id}">${num}${text}</a>`;
            });
            
            els.toc.innerHTML = tocHTML;
            setupScrollSpy();
        }

        function setupScrollSpy() {
            const sections = Array.from(els.content.querySelectorAll('h1[id], h2[id], h3[id]'));
            const tocItems = document.querySelectorAll('.toc-item');

            els.mainScroll.addEventListener('scroll', () => {
                clearTimeout(scrollTimer);
                scrollTimer = setTimeout(() => {
                    const mainRect = els.mainScroll.getBoundingClientRect();
                    let current = '';

                    for (let i = sections.length - 1; i >= 0; i--) {
                        const rect = sections[i].getBoundingClientRect();
                        if (rect.top <= mainRect.top + 200) {
                            current = sections[i].id;
                            break;
                        }
                    }

                    if (!current && sections.length) current = sections[0].id;

                    tocItems.forEach(item => {
                        item.classList.remove('active');
                        if (item.getAttribute('data-target') === current) {
                            item.classList.add('active');
                            syncIframe(current);
                        }
                    });
                }, 100);
            });
        }

        // === 4. Iframe Sync Logic ===
        function syncIframe(sectionId) {
            const heading = document.getElementById(sectionId);
            if (!heading) return;
            const text = heading.innerText;
            
            let hash = '';
            
            // Map specific PRD sections to iframe interactions
            // Example mappings based on PRD content
            if (text.includes('GitLab 激活态') || text.includes('平台选择 Tab')) {
                hash = '#gitlab';
            } else if (text.includes('GitHub 激活态') || text.includes('GitHub配置')) {
                hash = '#github';
            } else if (text.includes('Token 配置')) {
                hash = '#token';
            } else if (text.includes('仓库白名单')) {
                hash = '#whitelist';
            }

            if (!hash) return;

            const currentUrl = new URL(els.iframe.src, window.location.href);
            if (currentUrl.hash === hash) return;

            clearTimeout(iframeTimer);
            iframeTimer = setTimeout(() => {
                els.iframe.style.opacity = '0.5';
                
                setTimeout(() => {
                    // For single page, we can just update hash and trigger internal logic
                    els.iframe.contentWindow.location.hash = hash;
                    
                    try {
                        const win = els.iframe.contentWindow;
                        // Trigger functions in the prototype if they exist
                        if (hash === '#github' && typeof win.switchTab === 'function') {
                            win.switchTab('github');
                        } else if (hash === '#gitlab' && typeof win.switchTab === 'function') {
                            win.switchTab('gitlab');
                        }
                    } catch(e) {}
                    
                    els.iframe.style.opacity = '1';
                }, 200);
            }, 300);
        }

        // === 5. Controls ===
        els.btnToc.addEventListener('click', () => {
            isNavOpen = !isNavOpen;
            if (isNavOpen) {
                els.navCol.style.width = '320px';
                els.navCol.style.padding = '8rem 2rem 3rem 2rem';
                els.navCol.style.opacity = '1';
            } else {
                els.navCol.style.width = '0';
                els.navCol.style.padding = '8rem 0 3rem 0';
                els.navCol.style.opacity = '0';
            }
            setTimeout(resizeIframe, 500); // Wait for transition
        });

        function setupTheme() {
            els.btnTheme.addEventListener('click', () => {
                isDark = !isDark;
                document.documentElement.classList.toggle('dark', isDark);
                document.body.classList.toggle('dark', isDark);
                
                els.iconSun.classList.toggle('hidden', !isDark);
                els.iconMoon.classList.toggle('hidden', isDark);
                
                // Inject dark mode to iframe
                try {
                    const iframeDoc = els.iframe.contentDocument || els.iframe.contentWindow.document;
                    if (iframeDoc && iframeDoc.documentElement) {
                        iframeDoc.documentElement.classList.toggle('dark', isDark);
                    }
                } catch(e) {}
                
                // Re-render Mermaid
                mermaid.initialize({ theme: isDark ? 'dark' : 'base' });
                renderMermaid();
            });
        }

        // Hide iframe scrollbar on load
        els.iframe.onload = () => {
            try {
                const doc = els.iframe.contentDocument || els.iframe.contentWindow.document;
                const style = doc.createElement('style');
                style.textContent = `
                    body::-webkit-scrollbar, html::-webkit-scrollbar, *::-webkit-scrollbar { display: none !important; }
                    body, html { -ms-overflow-style: none !important; scrollbar-width: none !important; }
                    ${isDark ? 'body { background-color: #121212 !important; color: #f5f5f5; }' : ''}
                `;
                doc.head.appendChild(style);
            } catch(e) {}
            resizeIframe();
        };

        // Start
        init();

    </script>
</body>
</html>
