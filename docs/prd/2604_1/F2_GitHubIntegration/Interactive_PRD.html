<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRD - GitHub 集成功能 | PRD-Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pastel': '#FDF4F5',
                        'sidebar': '#E8F3F1',
                        'accent-pink': '#FFB5C2',
                        'accent-blue': '#A2D2FF',
                        'accent-yellow': '#FDE293',
                        'github-black': '#24292f'
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; }
        ::-webkit-scrollbar { display: none; width: 0; background: transparent; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .toc-item.active {
            background: linear-gradient(135deg, #A2D2FF 0%, #FFB5C2 100%);
            color: white;
            font-weight: 700;
        }

        .toc-item:hover:not(.active) {
            background: rgba(162, 210, 255, 0.2);
        }

        #prototype-iframe {
            background: white;
        }

        .mermaid svg {
            max-width: 100% !important;
            height: auto !important;
        }

        div[id^="dmermaid"] {
            position: absolute !important;
            top: -9999px !important;
            visibility: hidden !important;
        }

        .dark .mermaid-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #EF4444;
        }

        .prose h1 { font-family: 'Quicksand', sans-serif; font-weight: 700; }
        .prose h2 { font-family: 'Quicksand', sans-serif; font-weight: 700; border-bottom: 2px solid #E5E7EB; padding-bottom: 0.5rem; }
        .prose h3 { font-weight: 700; color: #4A4E69; }
        .prose table { border-collapse: collapse; width: 100%; }
        .prose th { background: #F3F4F6; font-weight: 700; text-align: left; }
        .prose th, .prose td { border: 1px solid #E5E7EB; padding: 0.5rem 0.75rem; font-size: 0.875rem; }
        .prose code { background: #F3F4F6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.875em; }
        .prose pre { background: #1F2937; color: #E5E7EB; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        .prose pre code { background: transparent; padding: 0; }

        .dark .prose h2 { border-bottom-color: #374151; }
        .dark .prose th { background: #374151; }
        .dark .prose th, .dark .prose td { border-color: #4B5563; }
        .dark .prose code { background: #374151; }

        .loading-spinner {
            border: 3px solid rgba(162, 210, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #A2D2FF;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-pastel dark:bg-slate-900 min-h-screen overflow-hidden">

    <!-- 左上角悬浮控制按钮 -->
    <div class="fixed top-4 left-4 z-50 flex flex-col gap-2">
        <button id="toggle-toc" class="w-12 h-12 bg-white dark:bg-slate-800 rounded-2xl shadow-lg flex items-center justify-center text-[#4A4E69] dark:text-white hover:scale-105 transition-transform border-2 border-transparent hover:border-accent-blue">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <button id="toggle-dark" class="w-12 h-12 bg-white dark:bg-slate-800 rounded-2xl shadow-lg flex items-center justify-center text-[#4A4E69] dark:text-white hover:scale-105 transition-transform border-2 border-transparent hover:border-accent-pink">
            <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </div>

    <!-- 主布局：三栏 -->
    <div class="flex h-screen w-screen">

        <!-- 左侧 TOC 目录 -->
        <aside id="toc-sidebar" class="w-72 bg-white dark:bg-slate-800 border-r border-gray-100 dark:border-slate-700 flex-shrink-0 overflow-hidden transition-all duration-300 shadow-xl z-40">
            <div class="h-full flex flex-col">
                <div class="h-16 flex items-center px-6 border-b border-gray-50 dark:border-slate-700 bg-gradient-to-r from-accent-blue/10 to-accent-pink/10">
                    <div class="w-8 h-8 rounded-lg bg-accent-blue flex items-center justify-center mr-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <span class="font-['Quicksand'] font-bold text-[#4A4E69] dark:text-white">目录导航</span>
                </div>
                <nav id="toc-nav" class="flex-1 overflow-y-auto py-4 px-3">
                    <!-- TOC items will be generated by JS -->
                </nav>
            </div>
        </aside>

        <!-- 中间 PRD 内容区 -->
        <main id="main-scroll" class="flex-1 overflow-y-auto bg-white dark:bg-slate-900 min-w-0">
            <div class="max-w-4xl mx-auto px-8 py-12 prose">
                <!-- Content will be rendered here -->
            </div>
        </main>

        <!-- 右侧原型预览区 -->
        <aside class="w-[800px] flex-shrink-0 bg-gray-50 dark:bg-slate-900 border-l border-gray-100 dark:border-slate-700 flex flex-col min-w-0">
            <div class="h-16 flex items-center justify-center border-b border-gray-100 dark:border-slate-700 bg-gradient-to-r from-gray-50 to-gray-100 dark:from-slate-800 dark:to-slate-900">
                <span class="text-sm font-semibold text-[#9CA3AF]">原型预览</span>
            </div>
            <div class="flex-1 relative overflow-hidden">
                <div id="prototype-container" class="w-full h-full flex items-start justify-center overflow-auto">
                    <iframe id="prototype-iframe" src="./Prototypes/admin.html" class="border-0" width="1280" height="800" style="transform: scale(0.625); transform-origin: top left;"></iframe>
                </div>
            </div>
        </aside>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 dark:bg-slate-900/80 z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-[#9CA3AF] font-semibold">正在加载 PRD...</p>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const PROTOTYPE_BASE = './Prototypes/admin.html';
        const MARKDOWN_FILE = './PRD_GitHubIntegration_2604_1.md';

        // ========== 状态 ==========
        let isDarkMode = false;
        let isTocVisible = true;
        let scrollDebounceTimer = null;
        let iframeUpdateTimeout = null;

        // ========== DOM 元素 ==========
        const mainScroll = document.getElementById('main-scroll');
        const tocNav = document.getElementById('toc-nav');
        const tocSidebar = document.getElementById('toc-sidebar');
        const prototypeIframe = document.getElementById('prototype-iframe');
        const loadingOverlay = document.getElementById('loading-overlay');
        const toggleTocBtn = document.getElementById('toggle-toc');
        const toggleDarkBtn = document.getElementById('toggle-dark');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        // ========== Markdown 转 HTML ==========
        async function loadMarkdown() {
            try {
                const response = await fetch(MARKDOWN_FILE);
                const markdown = await response.text();

                // 配置 marked
                marked.setOptions({
                    gfm: true,
                    breaks: true
                });

                // 解析并处理 Mermaid 代码块
                const htmlContent = await parseMarkdownWithMermaid(markdown);
                document.querySelector('.prose').innerHTML = htmlContent;

                // 生成 TOC
                generateTOC();

                // 初始化 Mermaid
                initMermaid();

                // 隐藏加载状态
                loadingOverlay.style.display = 'none';

            } catch (error) {
                console.error('Failed to load markdown:', error);
                loadingOverlay.innerHTML = '<p class="text-red-500">加载失败，请刷新重试</p>';
            }
        }

        // ========== Mermaid 图表处理 ==========
        function initMermaid() {
            mermaid.initialize({
                startOnLoad: false,
                theme: isDarkMode ? 'dark' : 'base',
                securityLevel: 'loose',
                htmlLabels: true
            });

            renderMermaidDiagrams();
        }

        async function parseMarkdownWithMermaid(markdown) {
            const codeBlockRegex = /```mermaid\n([\s\S]*?)```/g;
            const mermaidBlocks = [];
            let match;

            while ((match = codeBlockRegex.exec(markdown)) !== null) {
                mermaidBlocks.push({
                    index: match.index,
                    endIndex: match.index + match[0].length,
                    code: match[1],
                    placeholder: `__MERMAID_BLOCK_${mermaidBlocks.length}__`
                });
            }

            // 替换 Mermaid 代码块为占位符
            let processedMarkdown = markdown.replace(codeBlockRegex, (match, code) => {
                return `__MERMAID_BLOCK_${mermaidBlocks.length - 1}__`;
            });

            // 转换 HTML
            let html = await marked.parse(processedMarkdown);

            // 恢复 Mermaid 代码块
            mermaidBlocks.forEach((block, i) => {
                const encodedCode = block.code
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');

                html = html.replace(
                    `__MERMAID_BLOCK_${i}__`,
                    `<div class="mermaid-block" data-mermaid-index="${i}"><pre class="mermaid">${encodedCode}</pre></div>`
                );
            });

            return html;
        }

        async function renderMermaidDiagrams() {
            const mermaidBlocks = document.querySelectorAll('.mermaid-block');

            for (let i = 0; i < mermaidBlocks.length; i++) {
                const block = mermaidBlocks[i];
                const pre = block.querySelector('pre');
                const code = pre ? pre.textContent : '';

                if (!code.trim()) continue;

                try {
                    // 清理代码
                    let cleanCode = code
                        .replace(/&gt;/g, '>')
                        .replace(/&lt;/g, '<')
                        .replace(/&amp;/g, '&')
                        .replace(/&quot;/g, '"')
                        .replace(/&#39;/g, "'")
                        .replace(/&#x60;/g, '`')
                        .replace(/\u200B/g, '');

                    // 修复 ER 图关系符号空格
                    if (cleanCode.includes('erDiagram')) {
                        cleanCode = cleanCode
                            .split('||--o{').join(' ||--o{ ')
                            .split('||--||').join(' ||--|| ')
                            .split('||--o|').join(' ||--o| ')
                            .split('o--o{').join(' o--o{ ')
                            .split('o--||').join(' o--|| ');
                    }

                    // 修复 flowchart br 标签
                    if (cleanCode.includes('flowchart')) {
                        cleanCode = cleanCode.replace(/<br\s*\/?>/gi, '<br/>');
                    }

                    const id = 'mermaid-' + i;
                    const { svg } = await mermaid.render(id, cleanCode);

                    const container = document.createElement('div');
                    container.className = 'mermaid-container my-6 p-4 bg-gray-50 dark:bg-slate-800 rounded-2xl';
                    container.innerHTML = svg;

                    block.innerHTML = '';
                    block.appendChild(container);

                } catch (error) {
                    console.warn('Mermaid render error:', error);
                    block.innerHTML = `
                        <div class="mermaid-error p-4 rounded-lg my-4">
                            <p class="font-bold mb-2">图表渲染失败</p>
                            <pre class="text-xs overflow-x-auto">${code}</pre>
                            <p class="text-xs mt-2 text-red-500">${error.message}</p>
                        </div>
                    `;
                }
            }
        }

        // ========== TOC 生成 ==========
        function generateTOC() {
            const headings = document.querySelectorAll('.prose h1, .prose h2, .prose h3, .prose h4');
            tocNav.innerHTML = '';

            headings.forEach((heading, index) => {
                const id = `section-${index}`;
                heading.id = id;

                const level = parseInt(heading.tagName.charAt(1));
                const indentClass = level === 1 ? 'pl-3' : level === 2 ? 'pl-6' : 'pl-9';

                const item = document.createElement('a');
                item.href = `#${id}`;
                item.className = `toc-item block px-4 py-2.5 rounded-xl text-sm text-[#4A4E69] dark:text-slate-300 transition-all duration-200 ${indentClass} mb-1`;
                item.setAttribute('data-target', id);
                item.setAttribute('data-prototype', 'admin.html');

                const sectionNum = heading.textContent.match(/^(\d+\.)+/)?.[0] || '';
                const titleText = heading.textContent.replace(sectionNum, '').trim();

                item.innerHTML = sectionNum
                    ? `<span class="text-xs text-[#9CA3AF] mr-2">${sectionNum}</span>${titleText}`
                    : titleText;

                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    updateIframeState(id);
                });

                tocNav.appendChild(item);
            });
        }

        // ========== 滚动侦听 ==========
        mainScroll.addEventListener('scroll', () => {
            clearTimeout(scrollDebounceTimer);
            scrollDebounceTimer = setTimeout(() => {
                updateActiveTOC();
            }, 100);
        });

        function updateActiveTOC() {
            const sections = Array.from(document.querySelectorAll('.prose h1[id], .prose h2[id], .prose h3[id], .prose h4[id]'));
            const navItems = document.querySelectorAll('.toc-item');
            let current = '';

            const mainRect = mainScroll.getBoundingClientRect();

            for (let i = sections.length - 1; i >= 0; i--) {
                const section = sections[i];
                const rect = section.getBoundingClientRect();

                if (rect.top <= mainRect.top + 150) {
                    current = section.getAttribute('id');
                    break;
                }
            }

            if (!current && sections.length > 0) {
                current = sections[0].getAttribute('id');
            }

            navItems.forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-target') === current) {
                    item.classList.add('active');
                }
            });
        }

        // ========== iframe 状态同步 ==========
        function updateIframeState(targetId) {
            const iframe = prototypeIframe;
            const baseUrl = window.location.href;
            const currentUrl = new URL(iframe.src, baseUrl);
            const newSrcRaw = PROTOTYPE_BASE;
            const newUrl = new URL(newSrcRaw, baseUrl);

            newUrl.hash = targetId;

            if (currentUrl.pathname === newUrl.pathname && currentUrl.hash === newUrl.hash) {
                return;
            }

            clearTimeout(iframeUpdateTimeout);
            iframeUpdateTimeout = setTimeout(() => {
                iframe.style.opacity = '0';

                setTimeout(() => {
                    iframe.src = newUrl.pathname + newUrl.search;

                    iframe.onload = null;
                    iframe.onload = () => {
                        iframe.style.opacity = '1';

                        try {
                            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                            const iframeWin = iframe.contentWindow;

                            // 隐藏滚动条
                            const style = iframeDoc.createElement('style');
                            style.textContent = `
                                body::-webkit-scrollbar, html::-webkit-scrollbar, *::-webkit-scrollbar {
                                    display: none !important;
                                    width: 0 !important;
                                    background: transparent !important;
                                }
                                body, html, * {
                                    -ms-overflow-style: none !important;
                                    scrollbar-width: none !important;
                                }
                                #focus-overlay { display: none !important; }
                            `;
                            iframeDoc.head.appendChild(style);

                            // 触发状态
                            if (newUrl.hash) {
                                iframeWin.location.hash = newUrl.hash;
                                setTimeout(() => {
                                    triggerIframeAction(iframeWin, newUrl.hash);
                                }, 200);
                            }

                        } catch (e) {
                            console.warn('Cross-origin or style injection failed:', e);
                        }
                    };
                }, 150);
            }, 300);
        }

        function triggerIframeAction(iframeWin, hash) {
            try {
                iframeWin.document.body.classList.remove('focus-mode');
                const overlay = iframeWin.document.getElementById('focus-overlay');
                if (overlay) overlay.style.display = 'none';

                // 根据 hash 触发对应 Tab
                if (hash === '#section-4' || hash.includes('6.1.2')) {
                    // 平台选择 Tab - 默认 GitLab 激活
                    if (typeof iframeWin.switchTab === 'function') {
                        iframeWin.switchTab('gitlab');
                    }
                }
            } catch (e) {
                console.warn('Trigger action failed:', e);
            }
        }

        // ========== 主题切换 ==========
        toggleDarkBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            document.body.classList.toggle('dark', isDarkMode);

            sunIcon.classList.toggle('hidden', isDarkMode);
            moonIcon.classList.toggle('hidden', !isDarkMode);

            // 更新 prototype iframe 背景
            try {
                const iframeDoc = prototypeIframe.contentDocument || prototypeIframe.contentWindow.document;
                iframeDoc.body.style.backgroundColor = isDarkMode ? '#0f172a' : '#ffffff';
            } catch (e) {}

            // 重新渲染 Mermaid
            initMermaid();
        });

        // ========== TOC 切换 ==========
        toggleTocBtn.addEventListener('click', () => {
            isTocVisible = !isTocVisible;
            tocSidebar.style.transform = isTocVisible ? 'translateX(0)' : 'translateX(-100%)';
            tocSidebar.style.marginLeft = isTocVisible ? '0' : '-288px';
        });

        // ========== 初始化 ==========
        loadMarkdown();

    </script>
</body>
</html>
